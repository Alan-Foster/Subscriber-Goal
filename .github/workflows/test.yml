name: build-test-lint
on:
  pull_request:
  push:
permissions:
  contents: read
  actions: read
  checks: write
  statuses: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout repo
        uses: actions/checkout@v5
        with: # give hint for pull requests
          ref: ${{ github.head_ref }}
      - name: use node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.x"
          cache: "npm"
      - run: npm ci
      - run: npm run test:unit
      - run: npm run lint:ci
